<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>תוכנית טיול משפחתי — זלצבורג & שָלדמינג</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <div class="hero-media">
      <img id="headerImg" class="header-img" src="assets/header.jpg" alt="טיול משפחתי">
    </div>
    <div class="hero-content">
      <p class="eyebrow">טיול משפחתי באוסטריה</p>
      <h1>כבד את אביך ואת אימך</h1>
      <div class="meta">25.10.26–29.10.26 | זלצבורג – שלדמינג והסביבה</div>
    </div>
    <div class="hero-badge">🌄 5 ימים • מסלול משפחתי</div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <h2>ימים</h2>
      <nav id="daysList" class="days-list" aria-label="רשימת ימים"></nav>
      <div class="actions">
        <button id="printBtn">🖨️ הדפסה</button>
      </div>
    </aside>

    <section id="content" class="content">
      <!-- day content injected by script.js -->
    </section>
  </main>

  <footer>
    <small>אפשר להעתיק • בהצלחה לכולם</small>
  </footer>

  <script src="script.js"></script>
</body>
</html>
